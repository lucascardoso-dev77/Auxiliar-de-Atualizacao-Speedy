; =============================================================================
; config.ini - Configuracoes do IniciarNFCe
; =============================================================================
; Este arquivo deve ficar SEMPRE na mesma pasta do IniciarNFCe.exe.
;
; Diferenca importante em relacao ao config.ini do IniciarERP:
; aqui o campo itens_sincronizados esta preenchido, entao o atualizador
; NAO sincroniza a pasta toda - ele so mantem atualizados o executavel
; SpeedyNfce.exe e a pasta Relatorios, deixando todo o resto da pasta
; local intocado.
; =============================================================================

[Config]

; Nome do executavel que este atualizador deve controlar/abrir
exe_name = SpeedyNfce.exe

; Caminho da pasta compartilhada no servidor (ajustar por cliente)
server_dir = \\Servidor\10.7\NFCe

; Nome do arquivo que guarda o numero da versao (ex: 10.7.14)
version_file = versao.txt

; Segundos de espera apos fechar o SpeedyNfce.exe, para o Windows liberar
; os arquivos antes de copiar
kill_wait_seconds = 3

; Quantas vezes tentar novamente se um arquivo estiver bloqueado durante a copia
copy_retries = 3

; Segundos de espera entre tentativas de copia de um arquivo bloqueado
copy_retry_wait = 2

; Arquivos que NUNCA devem ser sobrescritos, mesmo que estejam dentro de
; um item sincronizado. Deixe em branco se nao houver nenhum caso assim
; no NFCe. Mesmo formato do IniciarERP: nomes separados por virgula.
arquivos_protegidos =

; MODO LISTA BRANCA: somente os itens listados aqui sao sincronizados.
; Pode ser um arquivo unico (ex: SpeedyNfce.exe) ou uma pasta inteira
; (ex: Relatorios, que sera copiada com todas as subpastas dela).
; Tudo o que existir localmente e NAO estiver nesta lista fica intocado.
itens_sincronizados = SpeedyNfce.exe, Relatorios

; Pasta compartilhada no servidor onde este terminal grava seu status a
; cada execucao. Usada pelo Painel de Monitoramento. Pode apontar para a
; MESMA pasta de status usada pelo IniciarERP - o painel identifica cada
; terminal/sistema pelo nome do computador + exe_name.
status_dir = \\Servidor\10.7\_status
