; =============================================================================
; config.ini - Configuracoes do IniciarERP
; =============================================================================
; Este arquivo deve ficar SEMPRE na mesma pasta do IniciarERP.exe.
; Assim, cada cliente/terminal pode ter seu proprio caminho de servidor
; sem precisar recompilar o executavel.
;
; Depois de editar, so salvar e abrir o IniciarERP.exe novamente.
; =============================================================================

[Config]

; Nome do executavel do ERP que este atualizador deve controlar/abrir
exe_name = SpeedyErp.exe

; Caminho da pasta compartilhada no servidor (ajustar por cliente)
server_dir = \\Servidor\10.7

; Nome do arquivo que guarda o numero da versao (ex: 10.7.14)
version_file = versao.txt

; Segundos de espera apos fechar o ERP, para o Windows liberar os arquivos
kill_wait_seconds = 3

; Quantas vezes tentar novamente se um arquivo estiver bloqueado durante a copia
copy_retries = 3

; Segundos de espera entre tentativas de copia de um arquivo bloqueado
copy_retry_wait = 2

; Arquivos que NUNCA devem ser sobrescritos pela atualizacao, mesmo que
; existam versoes diferentes no servidor. Separe varios nomes por virgula.
; Pode usar so o nome do arquivo (protege em qualquer subpasta) ou um
; caminho relativo especifico, ex: Config\Speedy.ini
arquivos_protegidos = Speedy.ini, config_export_balanca.cfg
