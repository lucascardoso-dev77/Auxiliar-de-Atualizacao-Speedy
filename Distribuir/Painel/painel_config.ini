; =============================================================================
; painel_config.ini - Configuracoes do Painel de Monitoramento
; =============================================================================
; Este arquivo deve ficar na mesma pasta do PainelStatus.exe, no SERVIDOR
; (nao nos terminais).
; =============================================================================

[Config]

; Pasta compartilhada onde os terminais gravam seus arquivos de status.
; Deve ser a MESMA pasta configurada em status_dir nos config.ini dos
; terminais (IniciarERP e IniciarNFCe podem apontar para a mesma pasta).
status_dir = \\Servidor\10.7\_status

; Porta em que o painel fica disponivel no navegador.
; Exemplo de acesso: http://localhost:8090 ou http://IP-DO-SERVIDOR:8090
porta = 8090

; Depois de quantos minutos sem nenhum contato um terminal passa a ser
; mostrado como "Sem contato" (cinza) no painel, mesmo que o ultimo status
; registrado tenha sido positivo. Ajuste conforme a rotina de uso real
; dos terminais (ex: se a loja so abre de manha, um valor baixo pode
; mostrar "sem contato" durante a noite, o que e esperado).
minutos_para_sem_contato = 180
